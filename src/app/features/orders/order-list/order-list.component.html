<div class="page-wrapper">

    <div class="page-header">
        <h2>Orders</h2>
        <button mat-raised-button color="primary" routerLink="/orders/create">
            <mat-icon>add</mat-icon> Create Order
        </button>
    </div>

    <mat-card>
        <mat-card-content>

            <mat-form-field appearance="outline" class="filter-field">
                <mat-label>Search</mat-label>
                <input matInput (keyup)="applyFilter($event)" placeholder="Search orders..." />
                <mat-icon matSuffix>search</mat-icon>
            </mat-form-field>

            <table mat-table [dataSource]="dataSource" matSort class="full-width mat-elevation-z1">

                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef>#</th>
                    <td mat-cell *matCellDef="let order; let i = index">{{ i + 1 }}</td>
                </ng-container>

                <ng-container matColumnDef="customerName">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Customer</th>
                    <td mat-cell *matCellDef="let order">{{ order.customerName }}</td>
                </ng-container>

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
                    <td mat-cell *matCellDef="let order">{{ order.email }}</td>
                </ng-container>

                <ng-container matColumnDef="items">
                    <th mat-header-cell *matHeaderCellDef>Items</th>
                    <td mat-cell *matCellDef="let order">{{ order.items.length }} item(s)</td>
                </ng-container>

                <ng-container matColumnDef="totalAmount">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Total</th>
                    <td mat-cell *matCellDef="let order">₹ {{ order.totalAmount }}</td>
                </ng-container>

                <ng-container matColumnDef="createdAt">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
                    <td mat-cell *matCellDef="let order">
                        {{ order.createdAt | date: 'dd MMM yyyy' }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef>Actions</th>
                    <td mat-cell *matCellDef="let order">
                        <button mat-icon-button color="warn" (click)="deleteOrder(order._id)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;" appHighlights>
                </tr>

            </table>

            <!-- Empty state -->
            @if(dataSource.data.length === 0) {
            <div class="empty-state">
                <mat-icon>inbox</mat-icon>
                <p>No orders found</p>
            </div>
            }

            <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons>
            </mat-paginator>

        </mat-card-content>
    </mat-card>

</div>
